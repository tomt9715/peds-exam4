<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peds Ch 41 — Cardiac</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a2540;
  --navy-soft: #1a3a5c;
  --teal: #0d9488;
  --teal-soft: #14b8a6;
  --ink: #1a1a1a;
  --ink-soft: #3a3a3a;
  --muted: #6b7280;
  --bg: #fafaf7;
  --card: #ffffff;
  --line: #e5e0d5;
  --line-strong: #d4cdbd;
  --correct: #059669;
  --correct-bg: #ecfdf5;
  --wrong: #dc2626;
  --wrong-bg: #fef2f2;
  --partial: #d97706;
  --partial-bg: #fffbeb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

/* STICKY HEADER */
.sticky-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.header-left { display: flex; flex-direction: column; }
.header-title { font-family: 'DM Serif Display', serif; font-size: 15px; color: #fff; letter-spacing: 0.01em; }
.header-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--teal-soft); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1px; }
.header-score { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 22px; color: #fff; }
.progress-bar-wrap { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.1); }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--teal-soft)); transition: width 0.4s ease; }

/* MAIN */
.main { max-width: 860px; margin: 0 auto; padding: 36px 20px 80px; }

/* QUESTION CARD */
.q-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.q-meta {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px;
  background: var(--navy);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.q-topic { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--teal-soft); }
.q-num { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.4); }

.q-body { padding: 28px 28px 20px; }
.q-stem {
  font-family: 'DM Serif Display', serif;
  font-size: 17px; line-height: 1.65;
  color: var(--ink); margin-bottom: 8px;
}
.q-instruction {
  font-size: 12px; color: var(--muted);
  font-style: italic; margin-bottom: 22px;
}

/* LAB BOX */
.lab-box {
  background: #f0f9ff; border: 1px solid #bae6fd;
  border-radius: 8px; padding: 12px 16px;
  margin-bottom: 20px;
}
.lab-box-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #0369a1; margin-bottom: 8px; }
.lab-row { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--ink-soft); padding: 3px 0; border-bottom: 1px solid #e0f2fe; }
.lab-row:last-child { border-bottom: none; }
.lab-val { font-family: 'DM Mono', monospace; font-size: 12px; }

/* OPTIONS */
.options { display: flex; flex-direction: column; gap: 10px; padding: 0 28px 24px; }
.opt {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 13px 16px; border-radius: 10px;
  border: 1.5px solid var(--line);
  background: var(--bg); cursor: pointer;
  transition: all 0.16s ease;
  font-size: 14px; line-height: 1.55;
  color: var(--ink-soft); text-align: left; width: 100%;
  font-family: 'Outfit', sans-serif;
}
.opt:hover:not(.disabled) { border-color: var(--teal); background: #f0fdfa; transform: translateX(3px); }
.opt.disabled { cursor: default; }
.opt.selected { border-color: var(--teal); background: #f0fdfa; }
.opt.correct { border-color: var(--correct); background: var(--correct-bg); color: #065f46; }
.opt.wrong { border-color: var(--wrong); background: var(--wrong-bg); color: #7f1d1d; }
.opt.missed { border-color: var(--partial); background: var(--partial-bg); border-style: dashed; color: #78350f; }
.opt.dimmed { opacity: 0.45; }

.opt-indicator {
  min-width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid var(--line-strong);
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
  color: var(--muted); margin-top: 1px; flex-shrink: 0;
  transition: all 0.15s;
}
.opt.selected .opt-indicator { border-color: var(--teal); color: var(--teal); background: #f0fdfa; }
.opt.correct .opt-indicator { border-color: var(--correct); background: var(--correct); color: #fff; }
.opt.wrong .opt-indicator { border-color: var(--wrong); background: var(--wrong); color: #fff; }
.opt.missed .opt-indicator { border-color: var(--partial); background: var(--partial); color: #fff; }

/* SATA submit */
.sata-submit-wrap { padding: 0 28px 20px; }
.sata-btn {
  padding: 11px 22px; background: var(--teal); border: none; border-radius: 8px;
  color: #fff; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.16s; letter-spacing: 0.03em;
}
.sata-btn:hover { background: var(--teal-soft); transform: translateY(-1px); }

/* RATIONALE */
.rationale-wrap {
  margin: 0 28px 28px;
  border-radius: 12px; overflow: hidden;
  border: 1px solid var(--line);
  animation: fadeUp 0.25s ease both;
  display: none;
}
.rationale-wrap.show { display: block; }

.rat-header {
  padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
}
.rat-header.correct-h { background: var(--correct-bg); border-bottom: 1px solid #a7f3d0; }
.rat-header.wrong-h { background: var(--wrong-bg); border-bottom: 1px solid #fecaca; }
.rat-header.partial-h { background: var(--partial-bg); border-bottom: 1px solid #fde68a; }

.rat-verdict { font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; }
.rat-header.correct-h .rat-verdict { color: var(--correct); }
.rat-header.wrong-h .rat-verdict { color: var(--wrong); }
.rat-header.partial-h .rat-verdict { color: var(--partial); }

.rat-badge {
  font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
  padding: 3px 10px; border-radius: 99px; letter-spacing: 0.08em;
}
.correct-badge { background: #d1fae5; color: #065f46; }
.wrong-badge { background: #fee2e2; color: #7f1d1d; }
.partial-badge { background: #fef3c7; color: #78350f; }

.rat-body { padding: 18px; background: #fff; }
.rat-concept {
  display: inline-block; font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: #f0fdfa; color: var(--teal); border: 1px solid #99f6e4;
  padding: 3px 10px; border-radius: 99px; margin-bottom: 12px;
}
.rat-answer {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 14px; color: var(--ink); margin-bottom: 12px; line-height: 1.5;
}
.rat-core { font-size: 13.5px; color: var(--ink-soft); line-height: 1.7; margin-bottom: 16px; }

.rat-section-title {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  padding-bottom: 6px; border-bottom: 1px solid var(--line);
}
.rat-option-row { display: flex; gap: 10px; margin-bottom: 10px; font-size: 13px; line-height: 1.6; }
.rat-opt-letter {
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
  min-width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
}
.rat-opt-letter.c { background: var(--correct-bg); color: var(--correct); }
.rat-opt-letter.w { background: var(--wrong-bg); color: var(--wrong); }
.rat-opt-letter.m { background: var(--partial-bg); color: var(--partial); }
.rat-opt-text { color: var(--ink-soft); }
.rat-opt-text strong { color: var(--ink); }

.sata-legend {
  display: flex; flex-wrap: wrap; gap: 12px; margin-top: 14px;
  padding-top: 12px; border-top: 1px solid var(--line);
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.legend-dot.c { background: var(--correct); }
.legend-dot.m { background: var(--partial); }
.legend-dot.w { background: var(--wrong); }

/* NEXT BTN */
.next-wrap { padding: 0 28px 28px; display: none; }
.next-wrap.show { display: block; }
.next-btn {
  width: 100%; padding: 14px;
  background: var(--navy); border: none; border-radius: 10px;
  color: #fff; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.18s; letter-spacing: 0.03em;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.next-btn:hover { background: var(--navy-soft); }
.next-arrow { transition: transform 0.2s; }
.next-btn:hover .next-arrow { transform: translateX(4px); }

/* RESULTS */
#results-screen { display: none; animation: fadeUp 0.4s ease both; }
.results-card {
  background: var(--navy); border-radius: 20px; padding: 40px 32px;
  text-align: center; margin-bottom: 28px; position: relative; overflow: hidden;
}
.results-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--teal), var(--teal-soft), #f59e0b);
}
.results-score {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 72px; color: #fff; line-height: 1; margin-bottom: 8px;
}
.results-pct { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--teal-soft); margin-bottom: 6px; letter-spacing: 0.1em; }
.results-msg { font-size: 15px; color: rgba(255,255,255,0.7); }

.results-breakdown {
  background: var(--card); border: 1px solid var(--line); border-radius: 16px;
  padding: 24px; margin-bottom: 20px;
}
.breakdown-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
.breakdown-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 13.5px; }
.breakdown-row:last-child { border-bottom: none; }
.breakdown-topic { color: var(--ink-soft); }
.breakdown-score { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; }
.breakdown-score.full { color: var(--correct); }
.breakdown-score.partial { color: var(--partial); }
.breakdown-score.zero { color: var(--wrong); }

.missed-section { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
.missed-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
.missed-item { padding: 14px 0; border-bottom: 1px solid var(--line); }
.missed-item:last-child { border-bottom: none; }
.missed-item-q { font-size: 13px; color: var(--ink-soft); margin-bottom: 6px; line-height: 1.5; }
.missed-item-q strong { color: var(--ink); }
.missed-item-concept { display: inline-block; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; background: #fef3c7; color: #78350f; border: 1px solid #fde68a; padding: 2px 8px; border-radius: 99px; margin-bottom: 6px; }
.missed-item-ans { font-size: 12.5px; color: var(--correct); margin-bottom: 4px; }
.missed-item-rat { font-size: 12.5px; color: var(--muted); line-height: 1.6; }

.retry-btn {
  width: 100%; padding: 15px; background: linear-gradient(135deg, var(--teal), var(--teal-soft));
  border: none; border-radius: 12px; color: #fff;
  font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all 0.18s; letter-spacing: 0.03em;
}
.retry-btn:hover { opacity: 0.9; transform: translateY(-1px); }

@media (max-width: 480px) {
  .main { padding: 20px 14px 60px; }
  .q-body, .options, .rationale-wrap, .next-wrap { padding-left: 16px; padding-right: 16px; }
  .q-stem { font-size: 15px; }
  .results-score { font-size: 56px; }
}
</style>

<div class="sticky-header">
  <div class="header-left">
    <div class="header-title">Chapter 41 — Cardiac</div>
    <div class="header-sub">Pediatric Nursing · Exam 4</div>
  </div>
  <div class="header-score" id="header-score">0 / 20</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
  </div>
</div>

<div class="main">
  <div id="quiz-screen">
    <div class="q-card" id="q-card"></div>
  </div>
  <div id="results-screen"></div>
</div>

<script>
const questions = [
  // 1
  {
    topic: 'Shunt Classification',
    type: 'standard',
    stem: 'A nurse is teaching a student about congenital heart defects. Which statement correctly distinguishes a left-to-right shunt from a right-to-left shunt?',
    options: [
      'Left-to-right shunts cause cyanosis because blood bypasses the lungs',
      'Right-to-left shunts send excess blood to the lungs, causing heart failure',
      'Left-to-right shunts increase pulmonary blood flow and cause heart failure symptoms',
      'Right-to-left shunts increase pulmonary blood flow and cause murmurs'
    ],
    answer: 2,
    concept: 'Shunt Direction & Effects',
    rationale: 'Left-to-right shunts send too much blood to the lungs → increased pulmonary blood flow → heart failure. Right-to-left shunts bypass the lungs entirely → decreased pulmonary blood flow → cyanosis (blue baby).',
    deepExplanation: 'Left → Right = too much to Lungs = fluid overload = heart failure. Right → Left = blood goes the Wrong way = no oxygenation = cyanosis. This framework classifies every congenital defect.',
    others: {
      0: 'This describes a right-to-left shunt, not left-to-right.',
      1: 'Right-to-left shunts BYPASS the lungs — they do not send excess blood there.',
      3: 'Right-to-left shunts decrease pulmonary blood flow and cause cyanosis, not increased flow.'
    }
  },
  // 2
  {
    topic: 'Defect Classification',
    type: 'standard',
    stem: 'A nursing student is reviewing congenital heart defects. Which defect belongs in the category of increased pulmonary blood flow?',
    options: [
      'Tetralogy of Fallot',
      'Tricuspid Atresia',
      'Patent Ductus Arteriosus',
      'Pulmonary Atresia'
    ],
    answer: 2,
    concept: 'Increased Pulmonary Blood Flow',
    rationale: 'PDA is a left-to-right shunt — blood flows from the aorta through the patent ductus into the pulmonary artery, adding excess blood to the lungs. TOF and Tricuspid Atresia are right-to-left shunts with decreased pulmonary blood flow.',
    deepExplanation: 'PDA, ASD, and VSD all cause left-to-right shunting → increased pulmonary blood flow → heart failure symptoms. PDA was specifically confirmed as a test answer for this category.',
    others: {
      0: 'TOF causes right-to-left shunting → decreased pulmonary blood flow → cyanosis.',
      1: 'Tricuspid Atresia is a right-to-left shunt causing decreased pulmonary blood flow and cyanosis.',
      3: 'Pulmonary Atresia is a cyanotic defect with decreased pulmonary blood flow.'
    }
  },
  // 3
  {
    topic: 'Tetralogy of Fallot',
    type: 'standard',
    stem: 'A parent asks the nurse to explain what makes Tetralogy of Fallot different from other heart defects. Which response best describes the four components of TOF?',
    options: [
      'ASD, overriding aorta, left ventricular hypertrophy, and aortic stenosis',
      'Pulmonary stenosis, VSD, overriding aorta, and right ventricular hypertrophy',
      'PDA, tricuspid atresia, VSD, and pulmonary stenosis',
      'VSD, ASD, overriding aorta, and left ventricular hypertrophy'
    ],
    answer: 1,
    concept: 'TOF — Four Defects',
    rationale: 'TOF is defined by exactly four defects: pulmonary stenosis, VSD, overriding aorta, and right ventricular hypertrophy. It is the most common cyanotic congenital heart defect.',
    deepExplanation: 'A mnemonic: PROVE — Pulmonary stenosis, Right ventricular hypertrophy, Overriding aorta, VSD, Everything together = TOF. The VSD + pulmonary stenosis forces blood right-to-left, causing cyanosis.',
    others: {
      0: 'Left ventricular hypertrophy is not part of TOF — it is RIGHT ventricular hypertrophy. ASD is not a component.',
      2: 'PDA and tricuspid atresia are separate defects — not components of TOF.',
      3: 'ASD is not a component of TOF, and hypertrophy affects the RIGHT ventricle, not left.'
    }
  },
  // 4
  {
    topic: 'Tet Spell',
    type: 'standard',
    stem: 'A 2-year-old with Tetralogy of Fallot becomes acutely cyanotic and agitated during a crying episode. The child\'s oxygen saturation drops to 72%. What is the priority nursing intervention?',
    options: [
      'Administer IV morphine and notify the provider',
      'Place the child in knee-to-chest position and apply supplemental oxygen',
      'Obtain a 12-lead ECG and prepare for cardioversion',
      'Initiate IV access and administer normal saline bolus'
    ],
    answer: 1,
    concept: 'Hypercyanotic Spell — Priority',
    rationale: 'Knee-to-chest position is the priority intervention for a Tet spell. It increases systemic vascular resistance, which decreases the right-to-left shunt and forces more blood through the pulmonary circulation for oxygenation. Supplemental oxygen is given concurrently.',
    deepExplanation: 'Tet spells are triggered by crying, feeding, or activity. Knee-to-chest mimics the squatting position older children instinctively adopt. It traps blood in the lower extremities, increasing afterload and redirecting flow to the lungs.',
    others: {
      0: 'Morphine may be used as a second-line intervention but positioning and O2 come first.',
      2: 'A Tet spell is not a dysrhythmia — cardioversion is not indicated.',
      3: 'A fluid bolus does not address the pathophysiology of a hypercyanotic spell.'
    }
  },
  // 5
  {
    topic: 'Morphine in TOF',
    type: 'standard',
    stem: 'A nurse administers IV morphine to an infant experiencing a hypercyanotic episode. Which finding indicates the medication has achieved its therapeutic effect?',
    options: [
      'The infant\'s heart rate decreases from 180 to 100 bpm',
      'The infant becomes calm and oxygen saturation rises to 88%',
      'The infant\'s blood pressure increases and color improves to pink',
      'The infant falls asleep and respiratory rate drops to 14'
    ],
    answer: 1,
    concept: 'Morphine Therapeutic Effect — TOF',
    rationale: 'The therapeutic effect of morphine in a Tet spell is that the infant becomes calm and oxygen saturation improves (e.g., 88%). Morphine relieves infundibular spasm and reduces the anxiety/agitation that drives hyperpnea, which worsens the right-to-left shunt.',
    deepExplanation: 'Agitation increases O2 demand and worsens hyperpnea → more right-to-left shunting → deeper cyanosis. Morphine breaks this cycle by sedating the infant and relaxing the infundibular spasm. The goal is NOT a normal O2 sat — 88% is acceptable and expected improvement in a cyanotic heart defect.',
    others: {
      0: 'Heart rate reduction alone is not the therapeutic target — oxygenation and calmness are.',
      2: 'Pink color would indicate overcorrection; these infants have baseline cyanosis.',
      3: 'A respiratory rate of 14 in an infant is abnormally low and would suggest respiratory depression, an adverse effect.'
    }
  },
  // 6
  {
    topic: 'Congestive Heart Failure',
    type: 'standard',
    stem: 'A 4-month-old infant is brought to the clinic with a known VSD. The parents report the infant tires easily during feedings and has not been gaining weight as expected. Which concept best explains this finding?',
    options: [
      'Polycythemia from chronic hypoxia',
      'Malabsorption syndrome secondary to bowel ischemia',
      'Congestive heart failure causing inability to gain weight',
      'Increased metabolic demand from fever and infection'
    ],
    answer: 2,
    concept: 'CHF — Failure to Thrive',
    rationale: 'In pediatric congestive heart failure, infants use enormous energy just to breathe and feed. Feeding is the equivalent of exercise for a cardiac infant — they fatigue quickly, take in less calories, and burn more energy, resulting in failure to gain weight.',
    deepExplanation: 'This is a hallmark finding of CHF in infants. The left-to-right shunt from VSD floods the lungs, increasing the work of breathing. Feeding requires sustained effort the infant cannot maintain. Weight gain failure and diaphoresis with feeds are classic CHF signs in this age group.',
    others: {
      0: 'Polycythemia occurs in cyanotic (right-to-left) defects, not left-to-right shunts like VSD.',
      1: 'Malabsorption is not a mechanism of VSD-related poor weight gain.',
      3: 'Nothing in the scenario suggests fever or infection.'
    }
  },
  // 7
  {
    topic: 'Kawasaki Disease',
    type: 'standard',
    stem: 'A nurse is caring for a 3-year-old admitted with Kawasaki disease. The child has had a fever for 6 days, bilateral conjunctival injection, strawberry tongue, and peeling skin on the hands. Which medications does the nurse anticipate administering?',
    options: [
      'IV vancomycin and oral prednisone',
      'IVIG and high-dose aspirin',
      'IV methylprednisolone and low-dose aspirin',
      'Oral amoxicillin and ibuprofen'
    ],
    answer: 1,
    concept: 'Kawasaki — Management',
    rationale: 'Kawasaki disease is treated with IVIG (intravenous immunoglobulin) to reduce inflammation and high-dose aspirin (80–100 mg/kg/day) for anti-inflammatory and antiplatelet effects. Once afebrile, aspirin is reduced to low-dose (3–5 mg/kg/day).',
    deepExplanation: 'IVIG + aspirin is the confirmed management pair for Kawasaki. IVIG reduces the risk of coronary artery aneurysm — the most feared complication. Aspirin is one of the rare pediatric indications because the benefit outweighs the Reye syndrome risk here.',
    others: {
      0: 'Vancomycin targets bacterial infections — Kawasaki is an inflammatory vasculitis, not a bacterial infection.',
      2: 'Methylprednisolone is not first-line for Kawasaki. The initial aspirin dose must be HIGH, not low.',
      3: 'Amoxicillin treats bacterial infections. Ibuprofen is not the anti-inflammatory agent of choice here.'
    }
  },
  // 8
  {
    topic: 'Kawasaki Disease',
    type: 'standard',
    stem: 'The nurse is teaching parents about long-term follow-up after their child\'s Kawasaki disease diagnosis. Which explanation is most accurate?',
    options: [
      'Once the fever resolves, no further cardiac monitoring is needed',
      'The child will need coronary artery monitoring because Kawasaki is the leading cause of acquired heart disease in children',
      'The child will require daily high-dose aspirin indefinitely',
      'IVIG prevents all cardiac complications so follow-up echocardiograms are optional'
    ],
    answer: 1,
    concept: 'Kawasaki — Long-Term Monitoring',
    rationale: 'Kawasaki disease is the leading cause of acquired heart disease in children. Coronary artery aneurysms can develop even after the acute phase resolves, requiring long-term echocardiographic monitoring.',
    deepExplanation: 'Parents must understand this is not just a fever illness — the coronary arteries are at risk for weeks after the acute phase. Once afebrile, aspirin drops to low-dose (3–5 mg/kg/day) — it is not maintained at high dose indefinitely.',
    others: {

// ── STATE ──────────────────────────────────────────────────────────────────
let current = 0;
let totalPoints = 0;
let answered = false;
let selectedSATA = new Set();
let missedItems = [];
let topicScores = {};

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  answered = false;
  selectedSATA = new Set();
  const q = questions[current];
  const card = document.getElementById('q-card');
  card.innerHTML = '';

  // META
  const meta = el('div', 'q-meta');
  meta.innerHTML = `<span class="q-topic">${q.topic}</span><span class="q-num">${current + 1} / ${questions.length}</span>`;
  card.appendChild(meta);

  // BODY
  const body = el('div', 'q-body');
  const stem = el('div', 'q-stem'); stem.textContent = q.stem; body.appendChild(stem);
  if (q.type === 'sata') {
    const inst = el('div', 'q-instruction'); inst.textContent = 'Select all that apply.'; body.appendChild(inst);
  }
  if (q.lab) {
    const lb = el('div', 'lab-box');
    lb.innerHTML = `<div class="lab-box-title">${q.lab.label}</div>` +
      q.lab.rows.map(r => `<div class="lab-row"><span>${r.name}</span><span class="lab-val">${r.value}</span></div>`).join('');
    body.appendChild(lb);
  }
  card.appendChild(body);

  // OPTIONS
  const opts = el('div', 'options');
  const letters = ['A','B','C','D','E','F'];
  q.options.forEach((txt, i) => {
    const btn = el('button', 'opt');
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="opt-indicator">${letters[i]}</span><span>${txt}</span>`;
    if (q.type === 'standard') btn.onclick = () => selectStandard(i);
    else btn.onclick = () => toggleSATA(i, btn);
    opts.appendChild(btn);
  });
  card.appendChild(opts);

  // SATA submit
  if (q.type === 'sata') {
    const sw = el('div', 'sata-submit-wrap');
    const sb = el('button', 'sata-btn'); sb.textContent = 'Submit Answer'; sb.id = 'sata-btn';
    sb.onclick = submitSATA; sw.appendChild(sb); card.appendChild(sw);
  }

  // RATIONALE placeholder
  const rat = el('div', 'rationale-wrap'); rat.id = 'rationale'; card.appendChild(rat);

  // NEXT
  const nw = el('div', 'next-wrap'); nw.id = 'next-wrap';
  const nb = el('button', 'next-btn');
  nb.innerHTML = current === questions.length - 1 ? 'See Final Results <span class="next-arrow">→</span>' : 'Next Question <span class="next-arrow">→</span>';
  nb.onclick = nextQ; nw.appendChild(nb); card.appendChild(nw);

  updateHeader();

  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = 'fadeUp 0.3s ease both'; });
}

function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }

// ── SELECTION ──────────────────────────────────────────────────────────────
function selectStandard(i) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const isCorrect = i === q.answer;
  const pts = isCorrect ? 1 : 0;
  totalPoints += pts;
  if (!isCorrect) recordMiss(q, q.options[q.answer], null);
  trackTopic(q.topic, pts, 1);

  document.querySelectorAll('.opt').forEach(btn => {
    btn.classList.add('disabled');
    const idx = parseInt(btn.dataset.idx);
    if (idx === q.answer) btn.classList.add(i === q.answer ? 'correct' : 'missed');
    if (idx === i && !isCorrect) btn.classList.add('wrong');
    if (idx !== q.answer && idx !== i) btn.classList.add('dimmed');
  });
  showRationaleStandard(isCorrect, q, i);
}

function toggleSATA(i, btn) {
  if (answered) return;
  if (selectedSATA.has(i)) { selectedSATA.delete(i); btn.classList.remove('selected'); }
  else { selectedSATA.add(i); btn.classList.add('selected'); }
}

function submitSATA() {
  if (answered || selectedSATA.size === 0) return;
  answered = true;
  const q = questions[current];
  const sel = [...selectedSATA];
  const correct = q.answerArr;
  const correctSel = sel.filter(i => correct.includes(i));
  const wrongSel = sel.filter(i => !correct.includes(i));
  const missed = correct.filter(i => !sel.includes(i));
  const pts = Math.max(0, (correctSel.length - wrongSel.length) / correct.length);
  totalPoints += pts;
  trackTopic(q.topic, pts, 1);
  if (pts < 1) recordMiss(q, correct.map(i => q.options[i]).join('; '), pts);

  document.querySelectorAll('.opt').forEach(btn => {
    btn.classList.add('disabled');
    const idx = parseInt(btn.dataset.idx);
    btn.classList.remove('selected');
    if (correct.includes(idx) && sel.includes(idx)) btn.classList.add('correct');
    else if (!correct.includes(idx) && sel.includes(idx)) btn.classList.add('wrong');
    else if (correct.includes(idx) && !sel.includes(idx)) btn.classList.add('missed');
    else btn.classList.add('dimmed');
  });
  document.getElementById('sata-btn').style.display = 'none';
  showRationaleSATA(pts, q, correctSel, wrongSel, missed);
}

// ── RATIONALE ──────────────────────────────────────────────────────────────
function showRationaleStandard(isCorrect, q, selected) {
  const rat = document.getElementById('rationale');
  const letters = ['A','B','C','D','E','F'];
  const hClass = isCorrect ? 'correct-h' : 'wrong-h';
  const verdict = isCorrect ? '✓ Correct' : '✗ Incorrect';
  const badgeClass = isCorrect ? 'correct-badge' : 'wrong-badge';
  const badgeText = isCorrect ? 'FULL CREDIT' : 'NO CREDIT';

  let othersHTML = '';
  if (q.others) {
    othersHTML = `<div class="rat-section-title">Why others are wrong</div>`;
    Object.entries(q.others).forEach(([idx, txt]) => {
      const i = parseInt(idx);
      const type = i === q.answer ? 'c' : 'w';
      othersHTML += `<div class="rat-option-row"><span class="rat-opt-letter ${type}">${letters[i]}</span><div class="rat-opt-text">${txt}</div></div>`;
    });
  }

  rat.innerHTML = `
    <div class="rat-header ${hClass}">
      <span class="rat-verdict">${verdict}</span>
      <span class="rat-badge ${badgeClass}">${badgeText}</span>
    </div>
    <div class="rat-body">
      <span class="rat-concept">${q.concept}</span>
      <div class="rat-answer">Answer: ${letters[q.answer]} — ${q.options[q.answer]}</div>
      <div class="rat-core">${q.rationale}</div>
      <div class="rat-section-title">Why the correct answer is correct</div>
      <div class="rat-core" style="margin-bottom:${othersHTML ? '16px' : '0'}">${q.deepExplanation}</div>
      ${othersHTML}
    </div>`;
  rat.classList.add('show');
  document.getElementById('next-wrap').classList.add('show');
}

function showRationaleSATA(pts, q, correctSel, wrongSel, missed) {
  const rat = document.getElementById('rationale');
  const letters = ['A','B','C','D','E','F'];
  const isFullCredit = pts === 1;
  const isNoCredit = pts === 0;
  const hClass = isFullCredit ? 'correct-h' : isNoCredit ? 'wrong-h' : 'partial-h';
  const verdict = isFullCredit ? '✓ Correct' : isNoCredit ? '✗ Incorrect' : '◑ Partial Credit';
  const badgeClass = isFullCredit ? 'correct-badge' : isNoCredit ? 'wrong-badge' : 'partial-badge';
  const badgeText = isFullCredit ? 'FULL CREDIT' : isNoCredit ? 'NO CREDIT' : `${Math.round(pts*100)}% CREDIT`;

  let perHTML = '';
  if (q.perOptionExplanations) {
    perHTML = `<div class="rat-section-title">Correct answers explained</div>`;
    Object.entries(q.perOptionExplanations).forEach(([idx, txt]) => {
      const i = parseInt(idx);
      perHTML += `<div class="rat-option-row"><span class="rat-opt-letter c">${letters[i]}</span><div class="rat-opt-text">${txt}</div></div>`;
    });
  }
  let othersHTML = '';
  if (q.others) {
    othersHTML = `<div class="rat-section-title" style="margin-top:14px">Why others are wrong</div>`;
    Object.entries(q.others).forEach(([idx, txt]) => {
      const i = parseInt(idx);
      othersHTML += `<div class="rat-option-row"><span class="rat-opt-letter w">${letters[i]}</span><div class="rat-opt-text">${txt}</div></div>`;
    });
  }

  const answerLetters = q.answerArr.map(i => letters[i]).join(', ');
  const answerText = q.answerArr.map(i => q.options[i]).join('; ');

  rat.innerHTML = `
    <div class="rat-header ${hClass}">
      <span class="rat-verdict">${verdict}</span>
      <span class="rat-badge ${badgeClass}">${badgeText}</span>
    </div>
    <div class="rat-body">
      <span class="rat-concept">${q.concept}</span>
      <div class="rat-answer">Answer: ${answerLetters} — ${answerText}</div>
      <div class="rat-core">${q.rationale}</div>
      ${perHTML}${othersHTML}
      <div class="sata-legend">
        <div class="legend-item"><div class="legend-dot c"></div>Correct & selected</div>
        <div class="legend-item"><div class="legend-dot m"></div>Correct but missed</div>
        <div class="legend-item"><div class="legend-dot w"></div>Incorrect & selected</div>
      </div>
    </div>`;
  rat.classList.add('show');
  document.getElementById('next-wrap').classList.add('show');
}

// ── TRACKING ───────────────────────────────────────────────────────────────
function trackTopic(topic, pts, total) {
  if (!topicScores[topic]) topicScores[topic] = { pts: 0, total: 0 };
  topicScores[topic].pts += pts;
  topicScores[topic].total += total;
}
function recordMiss(q, answerText, pts) {
  missedItems.push({ q, answerText, pts });
}

// ── NAVIGATION ─────────────────────────────────────────────────────────────
function nextQ() {
  current++;
  if (current >= questions.length) showResults();
  else render();
}

function updateHeader() {
  const maxPts = questions.length;
  document.getElementById('header-score').textContent = `${totalPoints.toFixed(1)} / ${maxPts}`;
  document.getElementById('progress-bar').style.width = `${(current / questions.length) * 100}%`;
}

// ── RESULTS ────────────────────────────────────────────────────────────────
function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('results-screen');
  rs.style.display = 'block';

  const pct = Math.round((totalPoints / questions.length) * 100);
  let msg = pct >= 90 ? 'Content mastered. Exam-ready.' : pct >= 80 ? 'Strong. Review misses for final polish.' : pct >= 70 ? 'Passing. Focus on weakest areas.' : 'Review these concepts carefully.';

  // Topic breakdown
  let breakdownHTML = '';
  Object.entries(topicScores).forEach(([topic, s]) => {
    const p = s.pts / s.total;
    const cls = p >= 0.9 ? 'full' : p >= 0.5 ? 'partial' : 'zero';
    const display = s.total === 1 ? (p === 1 ? '✓' : '✗') : `${s.pts.toFixed(1)}/${s.total}`;
    breakdownHTML += `<div class="breakdown-row"><span class="breakdown-topic">${topic}</span><span class="breakdown-score ${cls}">${display}</span></div>`;
  });

  // Missed items
  let missedHTML = '';
  if (missedItems.length > 0) {
    missedHTML = `<div class="missed-section">
      <div class="missed-title">Missed Concepts (${missedItems.length})</div>`;
    missedItems.forEach((m, i) => {
      const creditLine = m.pts !== null ? ` <span style="color:var(--partial);font-size:11px;">(${Math.round(m.pts*100)}% credit)</span>` : '';
      missedHTML += `<div class="missed-item">
        <div class="missed-item-concept">${m.q.concept}</div>
        <div class="missed-item-q"><strong>Q${missedItems.indexOf(m)+1}:</strong> ${m.q.stem.substring(0,100)}...</div>
        <div class="missed-item-ans">✓ ${m.answerText}${creditLine}</div>
        <div class="missed-item-rat">${m.q.rationale}</div>
      </div>`;
    });
    missedHTML += '</div>';
  }

  rs.innerHTML = `
    <div class="results-card">
      <div class="results-score">${totalPoints.toFixed(1)}/${questions.length}</div>
      <div class="results-pct">${pct}%</div>
      <div class="results-msg">${msg}</div>
    </div>
    <div class="results-breakdown">
      <div class="breakdown-title">Topic Breakdown</div>
      ${breakdownHTML}
    </div>
    ${missedHTML}
    <button class="retry-btn" onclick="restart()">🔄 Retake Quiz</button>`;
}

function restart() {
  current = 0; totalPoints = 0; answered = false;
  selectedSATA = new Set(); missedItems = []; topicScores = {};
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  render();
}

render();
</script>
</body>
</html>
