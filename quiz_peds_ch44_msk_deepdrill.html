<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peds Ch 44 — MSK Deep Drill</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a2540;
  --navy-soft: #1a3a5c;
  --teal: #0d9488;
  --teal-soft: #14b8a6;
  --ink: #1a1a1a;
  --ink-soft: #3a3a3a;
  --muted: #6b7280;
  --bg: #fafaf7;
  --card: #ffffff;
  --line: #e5e0d5;
  --line-strong: #d4cdbd;
  --correct: #059669;
  --correct-bg: #ecfdf5;
  --wrong: #dc2626;
  --wrong-bg: #fef2f2;
  --partial: #d97706;
  --partial-bg: #fffbeb;
  --confirmed: #7c3aed;
  --confirmed-bg: #f5f3ff;
  --confirmed-border: #ddd6fe;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

.sticky-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy); padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px; box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.header-left { display: flex; flex-direction: column; }
.header-title { font-family: 'DM Serif Display', serif; font-size: 15px; color: #fff; }
.header-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--teal-soft); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1px; }
.header-score { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 22px; color: #fff; }
.progress-bar-wrap { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.1); }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--teal-soft)); transition: width 0.4s ease; }

.main { max-width: 860px; margin: 0 auto; padding: 36px 20px 80px; }

.q-card {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; overflow: hidden;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.q-meta {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px; background: var(--navy);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.q-topic { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--teal-soft); }
.q-num { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.4); }

.confirmed-banner {
  display: flex; align-items: center; gap: 8px; padding: 9px 24px;
  background: var(--confirmed-bg); border-bottom: 1px solid var(--confirmed-border);
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--confirmed); font-weight: 500;
}
.confirmed-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--confirmed);
  flex-shrink: 0; box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
}

.q-body { padding: 28px 28px 20px; }
.q-stem { font-family: 'DM Serif Display', serif; font-size: 17px; line-height: 1.65; color: var(--ink); margin-bottom: 8px; }
.q-instruction { font-size: 12px; color: var(--muted); font-style: italic; margin-bottom: 22px; }

.options { display: flex; flex-direction: column; gap: 10px; padding: 0 28px 24px; }
.opt {
  display: flex; align-items: flex-start; gap: 14px; padding: 13px 16px;
  border-radius: 10px; border: 1.5px solid var(--line); background: var(--bg);
  cursor: pointer; transition: all 0.16s ease; font-size: 14px; line-height: 1.55;
  color: var(--ink-soft); text-align: left; width: 100%; font-family: 'Outfit', sans-serif;
}
.opt:hover:not(.disabled) { border-color: var(--teal); background: #f0fdfa; transform: translateX(3px); }
.opt.disabled { cursor: default; }
.opt.selected { border-color: var(--teal); background: #f0fdfa; }
.opt.correct { border-color: var(--correct); background: var(--correct-bg); color: #065f46; }
.opt.wrong { border-color: var(--wrong); background: var(--wrong-bg); color: #7f1d1d; }
.opt.missed { border-color: var(--partial); background: var(--partial-bg); border-style: dashed; color: #78350f; }
.opt.dimmed { opacity: 0.45; }

.opt-indicator {
  min-width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--line-strong);
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
  color: var(--muted); margin-top: 1px; flex-shrink: 0; transition: all 0.15s;
}
.opt.selected .opt-indicator { border-color: var(--teal); color: var(--teal); background: #f0fdfa; }
.opt.correct .opt-indicator { border-color: var(--correct); background: var(--correct); color: #fff; }
.opt.wrong .opt-indicator { border-color: var(--wrong); background: var(--wrong); color: #fff; }
.opt.missed .opt-indicator { border-color: var(--partial); background: var(--partial); color: #fff; }

.sata-submit-wrap { padding: 0 28px 20px; }
.sata-btn {
  padding: 11px 22px; background: var(--teal); border: none; border-radius: 8px;
  color: #fff; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.16s;
}
.sata-btn:hover { background: var(--teal-soft); transform: translateY(-1px); }

.rationale-wrap {
  margin: 0 28px 28px; border-radius: 12px; overflow: hidden;
  border: 1px solid var(--line); display: none; animation: fadeUp 0.25s ease both;
}
.rationale-wrap.show { display: block; }
.rat-header {
  padding: 14px 18px; display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 8px;
}
.rat-header.correct-h { background: var(--correct-bg); border-bottom: 1px solid #a7f3d0; }
.rat-header.wrong-h { background: var(--wrong-bg); border-bottom: 1px solid #fecaca; }
.rat-header.partial-h { background: var(--partial-bg); border-bottom: 1px solid #fde68a; }
.rat-verdict { font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; }
.rat-header.correct-h .rat-verdict { color: var(--correct); }
.rat-header.wrong-h .rat-verdict { color: var(--wrong); }
.rat-header.partial-h .rat-verdict { color: var(--partial); }
.rat-badge { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; padding: 3px 10px; border-radius: 99px; letter-spacing: 0.08em; }
.correct-badge { background: #d1fae5; color: #065f46; }
.wrong-badge { background: #fee2e2; color: #7f1d1d; }
.partial-badge { background: #fef3c7; color: #78350f; }
.rat-body { padding: 18px; background: #fff; }
.rat-concept {
  display: inline-block; font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.1em; text-transform: uppercase; background: #f0fdfa; color: var(--teal);
  border: 1px solid #99f6e4; padding: 3px 10px; border-radius: 99px; margin-bottom: 12px;
}
.rat-answer { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 14px; color: var(--ink); margin-bottom: 12px; line-height: 1.5; }
.rat-core { font-size: 13.5px; color: var(--ink-soft); line-height: 1.7; margin-bottom: 16px; }
.rat-section-title {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  padding-bottom: 6px; border-bottom: 1px solid var(--line);
}
.rat-option-row { display: flex; gap: 10px; margin-bottom: 10px; font-size: 13px; line-height: 1.6; }
.rat-opt-letter {
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
  min-width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
}
.rat-opt-letter.c { background: var(--correct-bg); color: var(--correct); }
.rat-opt-letter.w { background: var(--wrong-bg); color: var(--wrong); }
.rat-opt-text { color: var(--ink-soft); }
.rat-opt-text strong { color: var(--ink); }
.sata-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line); }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.legend-dot.c { background: var(--correct); }
.legend-dot.m { background: var(--partial); }
.legend-dot.w { background: var(--wrong); }

.next-wrap { padding: 0 28px 28px; display: none; }
.next-wrap.show { display: block; }
.next-btn {
  width: 100%; padding: 14px; background: var(--navy); border: none; border-radius: 10px;
  color: #fff; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.18s; letter-spacing: 0.03em;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.next-btn:hover { background: var(--navy-soft); }
.next-arrow { transition: transform 0.2s; }
.next-btn:hover .next-arrow { transform: translateX(4px); }

#results-screen { display: none; animation: fadeUp 0.4s ease both; }
.results-card {
  background: var(--navy); border-radius: 20px; padding: 40px 32px;
  text-align: center; margin-bottom: 28px; position: relative; overflow: hidden;
}
.results-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--teal), var(--teal-soft), #f59e0b); }
.results-score { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 72px; color: #fff; line-height: 1; margin-bottom: 8px; }
.results-pct { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--teal-soft); margin-bottom: 6px; letter-spacing: 0.1em; }
.results-msg { font-size: 15px; color: rgba(255,255,255,0.7); }
.results-breakdown { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
.breakdown-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
.breakdown-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 13.5px; }
.breakdown-row:last-child { border-bottom: none; }
.breakdown-topic { color: var(--ink-soft); }
.breakdown-score { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; }
.breakdown-score.full { color: var(--correct); }
.breakdown-score.partial { color: var(--partial); }
.breakdown-score.zero { color: var(--wrong); }
.missed-section { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
.missed-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
.missed-item { padding: 14px 0; border-bottom: 1px solid var(--line); }
.missed-item:last-child { border-bottom: none; }
.missed-item-q { font-size: 13px; color: var(--ink-soft); margin-bottom: 6px; line-height: 1.5; }
.missed-item-q strong { color: var(--ink); }
.missed-item-concept { display: inline-block; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; background: #fef3c7; color: #78350f; border: 1px solid #fde68a; padding: 2px 8px; border-radius: 99px; margin-bottom: 6px; }
.missed-item-confirmed { display: inline-block; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; background: var(--confirmed-bg); color: var(--confirmed); border: 1px solid var(--confirmed-border); padding: 2px 8px; border-radius: 99px; margin-bottom: 6px; margin-left: 4px; }
.missed-item-ans { font-size: 12.5px; color: var(--correct); margin-bottom: 4px; }
.missed-item-rat { font-size: 12.5px; color: var(--muted); line-height: 1.6; }
.retry-btn {
  width: 100%; padding: 15px; background: linear-gradient(135deg, var(--teal), var(--teal-soft));
  border: none; border-radius: 12px; color: #fff; font-family: 'Outfit', sans-serif;
  font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.18s;
}
.retry-btn:hover { opacity: 0.9; transform: translateY(-1px); }

@media (max-width: 480px) {
  .main { padding: 20px 14px 60px; }
  .q-body { padding: 20px 16px 16px; }
  .options { padding: 0 16px 20px; }
  .rationale-wrap { margin: 0 16px 20px; }
  .next-wrap { padding: 0 16px 20px; }
  .q-stem { font-size: 15px; }
  .results-score { font-size: 52px; }
}
</style>
</head>
<body>

<div class="sticky-header">
  <div class="header-left">
    <div class="header-title">Chapter 44 — MSK · Deep Drill</div>
    <div class="header-sub">Pediatric Nursing · Exam 4</div>
  </div>
  <div class="header-score" id="header-score">0 / 20</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
  </div>
</div>

<div class="main">
  <div id="quiz-screen"><div class="q-card" id="q-card"></div></div>
  <div id="results-screen"></div>
</div>

<script>
const questions = [
  // 1 — Buck traction skin confirmed
  {
    topic: 'Traction — Skin Integrity',
    confirmed: true,
    type: 'standard',
    stem: 'A child is in Buck\'s traction. During the nurse\'s assessment, redness and irritation are noted on the skin beneath the traction bandage. Which action by the nurse is the priority?',
    options: [
      'Remove the traction to inspect the skin and reapply after 30 minutes',
      'Document the finding and reassess at the next scheduled check',
      'Assess that the skin remains intact and dry, then notify the provider',
      'Apply a moisture barrier cream under the bandage to reduce irritation'
    ],
    answer: 2,
    concept: 'Buck\'s Traction — Skin Priority',
    rationale: 'With skin traction, the priority concern is skin integrity. Red, irritated skin must be assessed to confirm it remains intact and dry — breakdown indicates pressure injury risk. The provider must be notified. Traction weights are never removed by the nurse without a physician order.',
    deepExplanation: 'Two layers: know the priority assessment for skin traction (skin integrity) AND know that the nurse never removes traction weights. "Skin intact and dry" was specifically recalled as the answer from the test. Removing the traction or applying cream without provider order both violate traction protocols.',
    others: {
      0: 'Traction weights are NEVER removed by the nurse — this requires a physician order.',
      1: 'Documenting and waiting is inappropriate when skin integrity is at risk — the provider must be notified promptly.',
      3: 'Applying cream under the bandage without a provider order is outside nursing scope and could compromise the traction.'
    }
  },
  // 2 — Weights hang freely confirmed
  {
    topic: 'Traction — Weight Management',
    confirmed: true,
    type: 'standard',
    stem: 'During rounds, the nurse notices the weights on a child\'s traction are resting on the floor. Which action by the nurse is most appropriate?',
    options: [
      'Leave them in place — weights resting on the floor prevent excessive pulling force',
      'Reposition the child so the weights hang freely and notify the provider if unable to correct',
      'Remove the weights temporarily and document the interruption in traction',
      'Tie the weights higher on the rope to shorten the distance to the floor'
    ],
    answer: 1,
    concept: 'Traction — Weights Must Hang Freely',
    rationale: 'Traction weights must hang freely at all times — resting on the floor eliminates the therapeutic pulling force and renders the traction ineffective. The nurse must reposition the child to restore proper alignment so the weights hang freely.',
    deepExplanation: 'Two layers: know that weights must hang freely AND know the correct nursing action when they don\'t. Repositioning the child restores the pulling force. Removing or shortening the weights alters the prescribed traction force — neither is within nursing scope without a provider order.',
    others: {
      0: 'Weights resting on the floor completely eliminates the therapeutic traction force — this is never acceptable.',
      2: 'Removing weights requires a physician order — the nurse cannot unilaterally discontinue traction.',
      3: 'Altering the rope length changes the prescribed traction setup — this requires a provider order.'
    }
  },
  // 3 — Compartment syndrome early sign
  {
    topic: 'Compartment Syndrome',
    confirmed: false,
    type: 'standard',
    stem: 'A child with a femur fracture in a cast reports pain that has been increasing over the past hour despite two doses of IV morphine. The nurse notes the toes are pale and the child cannot wiggle them on request. Which condition does the nurse suspect and what is the priority action?',
    options: [
      'Normal post-fracture swelling; elevate the extremity and reassess in one hour',
      'Cast syndrome; loosen the outer dressing and apply ice',
      'Compartment syndrome; notify the provider immediately',
      'Deep vein thrombosis; prepare to administer anticoagulation therapy'
    ],
    answer: 2,
    concept: 'Compartment Syndrome — Recognition & Action',
    rationale: 'Unrelieved pain despite analgesics is the earliest and most important sign of compartment syndrome. Combined with pallor and inability to move the toes (paralysis), this presentation indicates vascular and nerve compromise within the compartment. The provider must be notified immediately — the cast may need to be bivalved.',
    deepExplanation: 'Two layers: recognize the 6 P\'s pointing to compartment syndrome (Pain unrelieved, Pallor, Paralysis) AND know that immediate provider notification is the action. Pain unrelieved by analgesics is the earliest warning sign. Waiting or elevating without notifying the provider delays a limb-threatening emergency.',
    others: {
      0: 'Unrelieved pain with pallor and paralysis is not normal post-fracture swelling — this is a limb-threatening emergency.',
      1: 'Loosening the dressing and applying ice does not address compartment syndrome — the provider must be notified for definitive intervention.',
      3: 'DVT causes pain and swelling but not pallor with complete loss of movement — the presentation points to compartment syndrome.'
    }
  },
  // 4 — Cast neurovascular checks confirmed
  {
    topic: 'Cast Care',
    confirmed: true,
    type: 'standard',
    stem: 'A child returns from the ED with a new fiberglass cast on the left forearm after a radius fracture. The nurse is planning care for the first 24 hours. Which assessment should be performed most frequently?',
    options: [
      'Pain score using the FACES scale every 8 hours',
      'Neurovascular checks every 4 hours',
      'Cast dryness and integrity check every shift',
      'Vital signs every 12 hours'
    ],
    answer: 1,
    concept: 'Cast Care — Neurovascular Assessment Frequency',
    rationale: 'Neurovascular checks every 4 hours are the priority assessment for a newly casted extremity. The first 24–48 hours carry the highest risk for swelling, vascular compromise, and early compartment syndrome. Neurovascular checks assess the 6 P\'s plus sensation, movement, cap refill, and skin temperature.',
    deepExplanation: 'Two layers: know what neurovascular checks assess AND know the frequency (q4hrs). Your friend specifically recalled "neuro checks q4hrs" as her answer on the test. Fiberglass casts dry quickly but the underlying swelling risk remains — q4hr checks catch early compromise before it becomes irreversible.',
    others: {
      0: 'Pain assessment every 8 hours is too infrequent for a new cast — pain is reassessed more frequently, especially in the first 24 hours.',
      2: 'Cast integrity checks are important but neurovascular status is the priority assessment frequency.',
      3: 'Vital signs every 12 hours are appropriate for a stable patient — neurovascular checks are the specific priority for a new cast.'
    }
  },
  // 5 — Traction nursing priorities SATA
  {
    topic: 'Traction — Nursing Priorities',
    confirmed: false,
    type: 'sata',
    stem: 'The nurse is caring for a child in skeletal traction. Which nursing actions are appropriate?',
    options: [
      'Maintain body alignment at all times',
      'Remove weights during meals to allow the child to sit upright comfortably',
      'Assess pin sites for signs of infection',
      'Encourage deep breathing exercises to prevent pneumonia',
      'Turn the child every 2 hours to prevent pressure injuries',
      'Reposition weights higher on the rope to reduce discomfort'
    ],
    answerArr: [0, 2, 3, 4],
    concept: 'Skeletal Traction — Nursing Actions',
    rationale: 'Skeletal traction priorities: maintain body alignment, assess pin sites for infection, deep breathing to prevent pneumonia from immobility, and turn every 2 hours for skin protection. Weights are NEVER removed or repositioned without a physician order.',
    perOptionExplanations: {
      0: '<strong>Maintain body alignment</strong> — proper alignment ensures the traction force is directed correctly for bone healing.',
      2: '<strong>Assess pin sites</strong> — pins penetrate bone and skin, creating a direct infection pathway requiring regular assessment.',
      3: '<strong>Deep breathing exercises</strong> — immobility increases pneumonia risk; coughing and deep breathing are preventive.',
      4: '<strong>Turn every 2 hours</strong> — prevents pressure injuries in an immobilized patient.'
    },
    others: {
      1: 'Weights are NEVER removed by the nurse — removing them for meals eliminates the therapeutic traction force and requires a physician order.',
      5: 'Repositioning the weights on the rope alters the prescribed traction setup — this requires a provider order, not a nursing decision.'
    }
  },
  // 6 — Club foot confirmed
  {
    topic: 'Club Foot',
    confirmed: true,
    type: 'standard',
    stem: 'The parent of an infant newly diagnosed with clubfoot asks the nurse what to expect from the treatment process. Which response by the nurse is most accurate?',
    options: [
      '"Your baby will need immediate surgery followed by a long period of casting."',
      '"Treatment begins with weekly gentle manipulation and serial cast changes, then transitions to bracing."',
      '"Clubfoot always resolves on its own by 6 months without any intervention."',
      '"Your baby will be placed in a brace immediately and casting is only used if bracing fails."'
    ],
    answer: 1,
    concept: 'Club Foot — Treatment Process',
    rationale: 'Clubfoot treatment follows the Ponseti method: weekly manipulation with serial cast changes initially, then every two weeks, followed by bracing or corrective shoes. Surgery is reserved for severe cases and is followed by casting and orthotics.',
    deepExplanation: 'Two layers: know the treatment sequence AND be able to explain it to a parent. Weekly casting was confirmed as a test answer. The key details are: starts with weekly cast changes, then every 2 weeks, then bracing. Surgery is not the first step — conservative casting is.',
    others: {
      0: 'Surgery is not the initial treatment — conservative management with serial casting comes first.',
      2: 'Clubfoot does not resolve spontaneously — early intervention with serial casting is required to correct the deformity.',
      3: 'Bracing comes after the casting phase, not as the initial treatment.'
    }
  },
  // 7 — Myelomeningocele pre-op confirmed
  {
    topic: 'Myelomeningocele',
    confirmed: true,
    type: 'standard',
    stem: 'A newborn with myelomeningocele is awaiting surgical repair. The nurse is preparing the infant for transport to the OR. Which pre-operative action is most important?',
    options: [
      'Place the infant supine and cover the sac with a dry sterile gauze',
      'Position the infant prone and cover the sac with a moist sterile dressing',
      'Sit the infant upright in a carrier to prevent pressure on the spine',
      'Apply a snug circumferential dressing around the sac to prevent rupture'
    ],
    answer: 1,
    concept: 'Myelomeningocele — Pre-op Positioning & Dressing',
    rationale: 'Pre-op myelomeningocele care: prone positioning keeps weight off the sac, and a moist sterile dressing prevents the exposed neural tissue from drying out and cracking. Dry dressings can adhere to the delicate sac and cause damage on removal.',
    deepExplanation: 'Two layers: know BOTH the correct position (prone) AND the correct dressing (moist sterile, not dry). Supine would put direct pressure on the sac. A snug circumferential dressing would compress the delicate neural tissue. Moist prevents drying — critical for preserving the tissue until surgery.',
    others: {
      0: 'Supine positioning places weight directly on the myelomeningocele sac. A dry dressing can adhere and damage the delicate neural tissue.',
      2: 'Upright positioning is contraindicated — it does not protect the sac and increases risk of rupture and infection.',
      3: 'A snug circumferential dressing would compress the exposed spinal cord and nerve tissue — this would cause irreversible neurological damage.'
    }
  },
  // 8 — Myelomeningocele post-op confirmed
  {
    topic: 'Myelomeningocele',
    confirmed: true,
    type: 'standard',
    stem: 'A neonate returns from surgical repair of myelomeningocele. The nurse should monitor most closely for which post-operative complication?',
    options: [
      'Hypoglycemia from prolonged NPO status',
      'Increased intracranial pressure and CSF leakage at the surgical site',
      'Pulmonary edema from aggressive intraoperative fluid resuscitation',
      'Septic shock from bowel contamination during surgery'

// ── STATE ──────────────────────────────────────
let current = 0, totalPoints = 0, answered = false;
let selectedSATA = new Set(), missedItems = [], topicScores = {};
const TOTAL = questions.length;
const LETTERS = ['A','B','C','D','E','F'];

function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
function updateHeader() {
  document.getElementById('header-score').textContent = `${totalPoints.toFixed(1)} / ${TOTAL}`;
  document.getElementById('progress-bar').style.width = `${(current / TOTAL) * 100}%`;
}
function trackTopic(topic, pts, total) {
  if (!topicScores[topic]) topicScores[topic] = { pts: 0, total: 0 };
  topicScores[topic].pts += pts; topicScores[topic].total += total;
}
function recordMiss(q, qNum, answerText, pts) { missedItems.push({ q, qNum, answerText, pts }); }

function render() {
  answered = false; selectedSATA = new Set();
  const q = questions[current];
  const card = document.getElementById('q-card');
  card.innerHTML = '';

  const meta = el('div', 'q-meta');
  meta.innerHTML = `<span class="q-topic">${q.topic}</span><span class="q-num">${current + 1} / ${TOTAL}</span>`;
  card.appendChild(meta);

  if (q.confirmed) {
    const banner = el('div', 'confirmed-banner');
    banner.innerHTML = `<span class="confirmed-dot"></span>Confirmed Test Item — recalled from actual exam`;
    card.appendChild(banner);
  }

  const body = el('div', 'q-body');
  const stem = el('div', 'q-stem'); stem.textContent = q.stem; body.appendChild(stem);
  if (q.type === 'sata') {
    const inst = el('div', 'q-instruction'); inst.textContent = 'Select all that apply.'; body.appendChild(inst);
  }
  card.appendChild(body);

  const opts = el('div', 'options');
  q.options.forEach((txt, i) => {
    const btn = el('button', 'opt'); btn.dataset.idx = i;
    btn.innerHTML = `<span class="opt-indicator">${LETTERS[i]}</span><span>${txt}</span>`;
    btn.onclick = q.type === 'standard' ? () => selectStandard(i) : () => toggleSATA(i, btn);
    opts.appendChild(btn);
  });
  card.appendChild(opts);

  if (q.type === 'sata') {
    const sw = el('div', 'sata-submit-wrap');
    const sb = el('button', 'sata-btn'); sb.id = 'sata-btn'; sb.textContent = 'Submit Answer';
    sb.onclick = submitSATA; sw.appendChild(sb); card.appendChild(sw);
  }

  const rat = el('div', 'rationale-wrap'); rat.id = 'rationale'; card.appendChild(rat);
  const nw = el('div', 'next-wrap'); nw.id = 'next-wrap';
  const nb = el('button', 'next-btn');
  nb.innerHTML = current === TOTAL - 1 ? 'See Final Results <span class="next-arrow">→</span>' : 'Next Question <span class="next-arrow">→</span>';
  nb.onclick = nextQ; nw.appendChild(nb); card.appendChild(nw);

  updateHeader();
  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = 'fadeUp 0.3s ease both'; });
}

function selectStandard(i) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const isCorrect = i === q.answer;
  const pts = isCorrect ? 1 : 0;
  totalPoints += pts;
  if (!isCorrect) recordMiss(q, current + 1, q.options[q.answer], null);
  trackTopic(q.topic, pts, 1);
  document.querySelectorAll('.opt').forEach(btn => {
    btn.classList.add('disabled');
    const idx = parseInt(btn.dataset.idx);
    if (idx === q.answer) btn.classList.add(isCorrect ? 'correct' : 'missed');
    if (idx === i && !isCorrect) btn.classList.add('wrong');
    if (idx !== q.answer && idx !== i) btn.classList.add('dimmed');
  });
  showRationaleStandard(isCorrect, q);
}

function toggleSATA(i, btn) {
  if (answered) return;
  if (selectedSATA.has(i)) { selectedSATA.delete(i); btn.classList.remove('selected'); }
  else { selectedSATA.add(i); btn.classList.add('selected'); }
}

function submitSATA() {
  if (answered || selectedSATA.size === 0) return;
  answered = true;
  const q = questions[current];
  const sel = [...selectedSATA];
  const correct = q.answerArr;
  const correctSel = sel.filter(i => correct.includes(i));
  const wrongSel = sel.filter(i => !correct.includes(i));
  const pts = Math.max(0, (correctSel.length - wrongSel.length) / correct.length);
  totalPoints += pts; trackTopic(q.topic, pts, 1);
  if (pts < 1) recordMiss(q, current + 1, correct.map(i => q.options[i]).join('; '), pts);
  document.querySelectorAll('.opt').forEach(btn => {
    btn.classList.add('disabled');
    const idx = parseInt(btn.dataset.idx);
    btn.classList.remove('selected');
    if (correct.includes(idx) && sel.includes(idx)) btn.classList.add('correct');
    else if (!correct.includes(idx) && sel.includes(idx)) btn.classList.add('wrong');
    else if (correct.includes(idx) && !sel.includes(idx)) btn.classList.add('missed');
    else btn.classList.add('dimmed');
  });
  const sb = document.getElementById('sata-btn');
  if (sb) sb.style.display = 'none';
  showRationaleSATA(pts, q);
}

function showRationaleStandard(isCorrect, q) {
  const rat = document.getElementById('rationale');
  const hClass = isCorrect ? 'correct-h' : 'wrong-h';
  const verdict = isCorrect ? '✓ Correct' : '✗ Incorrect';
  const badgeClass = isCorrect ? 'correct-badge' : 'wrong-badge';
  const badgeText = isCorrect ? 'FULL CREDIT' : 'NO CREDIT';
  let othersHTML = '';
  if (q.others) {
    othersHTML = `<div class="rat-section-title">Why others are wrong</div>`;
    Object.entries(q.others).forEach(([idx, txt]) => {
      const i = parseInt(idx);
      othersHTML += `<div class="rat-option-row"><span class="rat-opt-letter ${i === q.answer ? 'c' : 'w'}">${LETTERS[i]}</span><div class="rat-opt-text">${txt}</div></div>`;
    });
  }
  rat.innerHTML = `
    <div class="rat-header ${hClass}">
      <span class="rat-verdict">${verdict}</span>
      <span class="rat-badge ${badgeClass}">${badgeText}</span>
    </div>
    <div class="rat-body">
      <span class="rat-concept">${q.concept}</span>
      <div class="rat-answer">Answer: ${LETTERS[q.answer]} — ${q.options[q.answer]}</div>
      <div class="rat-core">${q.rationale}</div>
      <div class="rat-section-title">Why the correct answer is correct</div>
      <div class="rat-core" style="margin-bottom:${othersHTML ? '16px' : '0'}">${q.deepExplanation}</div>
      ${othersHTML}
    </div>`;
  rat.classList.add('show');
  document.getElementById('next-wrap').classList.add('show');
}

function showRationaleSATA(pts, q) {
  const rat = document.getElementById('rationale');
  const isFullCredit = pts === 1, isNoCredit = pts === 0;
  const hClass = isFullCredit ? 'correct-h' : isNoCredit ? 'wrong-h' : 'partial-h';
  const verdict = isFullCredit ? '✓ Correct' : isNoCredit ? '✗ Incorrect' : '◑ Partial Credit';
  const badgeClass = isFullCredit ? 'correct-badge' : isNoCredit ? 'wrong-badge' : 'partial-badge';
  const badgeText = isFullCredit ? 'FULL CREDIT' : isNoCredit ? 'NO CREDIT' : `${Math.round(pts*100)}% CREDIT`;
  let perHTML = '';
  if (q.perOptionExplanations) {
    perHTML = `<div class="rat-section-title">Correct answers explained</div>`;
    Object.entries(q.perOptionExplanations).forEach(([idx, txt]) => {
      perHTML += `<div class="rat-option-row"><span class="rat-opt-letter c">${LETTERS[parseInt(idx)]}</span><div class="rat-opt-text">${txt}</div></div>`;
    });
  }
  let othersHTML = '';
  if (q.others) {
    othersHTML = `<div class="rat-section-title" style="margin-top:14px">Why others are wrong</div>`;
    Object.entries(q.others).forEach(([idx, txt]) => {
      othersHTML += `<div class="rat-option-row"><span class="rat-opt-letter w">${LETTERS[parseInt(idx)]}</span><div class="rat-opt-text">${txt}</div></div>`;
    });
  }
  rat.innerHTML = `
    <div class="rat-header ${hClass}">
      <span class="rat-verdict">${verdict}</span>
      <span class="rat-badge ${badgeClass}">${badgeText}</span>
    </div>
    <div class="rat-body">
      <span class="rat-concept">${q.concept}</span>
      <div class="rat-answer">Answer: ${q.answerArr.map(i => LETTERS[i]).join(', ')} — ${q.answerArr.map(i => q.options[i]).join('; ')}</div>
      <div class="rat-core">${q.rationale}</div>
      ${perHTML}${othersHTML}
      <div class="sata-legend">
        <div class="legend-item"><div class="legend-dot c"></div>Correct & selected</div>
        <div class="legend-item"><div class="legend-dot m"></div>Correct but missed</div>
        <div class="legend-item"><div class="legend-dot w"></div>Incorrect & selected</div>
      </div>
    </div>`;
  rat.classList.add('show');
  document.getElementById('next-wrap').classList.add('show');
}

function nextQ() {
  current++;
  if (current >= TOTAL) showResults();
  else render();
}

function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('results-screen');
  rs.style.display = 'block';
  const pct = Math.round((totalPoints / TOTAL) * 100);
  const msg = pct >= 90 ? 'Content mastered. Exam-ready.' : pct >= 80 ? 'Strong. Review misses for final polish.' : pct >= 70 ? 'Passing. Focus on weakest areas.' : 'Review these concepts carefully.';
  let breakdownHTML = '';
  Object.entries(topicScores).forEach(([topic, s]) => {
    const p = s.pts / s.total;
    const cls = p >= 0.9 ? 'full' : p >= 0.5 ? 'partial' : 'zero';
    const display = s.total === 1 ? (p === 1 ? '✓' : '✗') : `${s.pts.toFixed(1)}/${s.total}`;
    breakdownHTML += `<div class="breakdown-row"><span class="breakdown-topic">${topic}</span><span class="breakdown-score ${cls}">${display}</span></div>`;
  });
  let missedHTML = '';
  if (missedItems.length > 0) {
    missedHTML = `<div class="missed-section"><div class="missed-title">Missed Concepts (${missedItems.length})</div>`;
    missedItems.forEach(m => {
      const creditLine = m.pts !== null ? ` <span style="color:var(--partial);font-size:11px;">(${Math.round(m.pts*100)}% credit)</span>` : '';
      const confirmedTag = m.q.confirmed ? `<span class="missed-item-confirmed">🎯 confirmed test item</span>` : '';
      missedHTML += `
        <div class="missed-item">
          <div><span class="missed-item-concept">${m.q.concept}</span>${confirmedTag}</div>
          <div class="missed-item-q"><strong>Q${m.qNum}:</strong> ${m.q.stem.substring(0, 110)}...</div>
          <div class="missed-item-ans">✓ ${m.answerText}${creditLine}</div>
          <div class="missed-item-rat">${m.q.rationale}</div>
        </div>`;
    });
    missedHTML += '</div>';
  }
  rs.innerHTML = `
    <div class="results-card">
      <div class="results-score">${totalPoints.toFixed(1)}/${TOTAL}</div>
      <div class="results-pct">${pct}%</div>
      <div class="results-msg">${msg}</div>
    </div>
    <div class="results-breakdown">
      <div class="breakdown-title">Topic Breakdown</div>
      ${breakdownHTML}
    </div>
    ${missedHTML}
    <button class="retry-btn" onclick="restart()">🔄 Retake Quiz</button>`;
}

function restart() {
  current = 0; totalPoints = 0; answered = false;
  selectedSATA = new Set(); missedItems = []; topicScores = {};
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  render();
}

render();
</script>
</body>
</html>
