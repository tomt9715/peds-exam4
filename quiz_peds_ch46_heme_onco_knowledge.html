.results-msg { font-size: 15px; color: rgba(255,255,255,0.7); }
.results-breakdown { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
.breakdown-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }

.breakdown-score { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; }

.breakdown-score.partial { color: var(--partial); }

.missed-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }

.missed-item-q { font-size: 13px; color: var(--ink-soft); margin-bottom: 6px; line-height: 1.5; }

.missed-item-concept { display: inline-block; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; background: #fef3c7; color: #78350f; border: 1px solid #fde68a; padding: 2px 8px; border-radius: 99px; margin-bottom: 6px; }

.retry-btn:hover { opacity: 0.9; transform: translateY(-1px); }

}

<script>
const questions = [
  // 1
  {
    topic: 'Neutropenic Precautions',
    type: 'sata',
    stem: 'A child receiving chemotherapy is placed on neutropenic precautions. Which actions by the nurse are correct?',
    options: [
      'Place the child in reverse isolation',
      'Allow fresh flowers brought by family to brighten the room',
      'Avoid rectal temperatures and rectal medications',
      'Monitor closely for fever as an early sign of infection',
      'Ensure no live vaccines are given during this period',
      'Encourage visitors to come in groups to support the child'
    ],
    answerArr: [0, 2, 3, 4],
    concept: 'Neutropenic Precautions',
    rationale: 'Neutropenic precautions: reverse isolation, no rectal temps or meds, monitor fever as infection indicator, and no live vaccines. Fresh flowers harbor bacteria and fungal spores — strictly prohibited. Visitors are limited and screened, not encouraged in groups.',
    perOptionExplanations: {
      0: '<strong>Reverse isolation</strong> — protects the immunocompromised child FROM environmental organisms.',
      2: '<strong>No rectal temps or meds</strong> — rectal mucosa is fragile; rectal procedures create infection entry points.',
      3: '<strong>Monitor fever</strong> — any temperature elevation is treated as infection until proven otherwise.',
      4: '<strong>No live vaccines</strong> — the child cannot mount an immune response and may develop infection from attenuated organisms.'
    },
    others: {
      1: 'Fresh flowers and plants are strictly prohibited — they harbor bacteria and fungal spores dangerous to neutropenic patients.',
      5: 'Visitors are limited and screened for illness — group visitation increases infection exposure risk.'
    }
  },
  // 2
  {
    topic: 'Blood Transfusion Reaction',
    type: 'standard',
    stem: 'A child receiving a blood transfusion develops fever and chills 15 minutes into the infusion. What is the nurse\'s first action?',
    options: [
      'Slow the infusion rate and notify the provider',
      'Stop the infusion immediately',
      'Administer diphenhydramine and continue at a slower rate',
      'Obtain a STAT CBC before taking any other action'
    ],
    answer: 1,
    concept: 'Transfusion Reaction — Stop First',
    rationale: 'The first action in any suspected transfusion reaction is to STOP the infusion immediately. Then maintain IV access with normal saline, notify the provider, send the blood bag to the blood bank, and monitor vitals. Never slow — stop completely.',
    deepExplanation: 'Fever and chills during a transfusion indicate a possible hemolytic or febrile non-hemolytic reaction. Continuing to infuse incompatible blood — even at a slower rate — worsens the reaction. The stop-first rule applies to all transfusion reactions regardless of perceived severity.',
    others: {
      0: 'Slowing the rate continues exposing the child to potentially incompatible blood — the infusion must be stopped completely.',
      2: 'Diphenhydramine and continuing is the approach for mild allergic reactions only — fever and chills require stopping first.',
      3: 'Obtaining labs without stopping the infusion delays the most critical intervention — stop first, then draw labs.'
    }
  },
  // 3
  {
    topic: 'Sickle Cell Crisis — Interventions',
    type: 'standard',
    stem: 'A child with sickle cell disease is admitted in vaso-occlusive crisis with severe leg pain. Which nursing intervention is the priority?',
    options: [
      'Administer supplemental oxygen at 2L/min via nasal cannula',
      'Initiate IV hydration aggressively',
      'Place on contact precautions and restrict activity',
      'Obtain blood cultures and start IV antibiotics'
    ],
    answer: 1,
    concept: 'Sickle Cell Crisis — Hydration Priority',
    rationale: 'Aggressive IV hydration is the priority intervention in vaso-occlusive sickle cell crisis. It dilutes the blood, reduces viscosity, and improves flow through occluded vessels. Oxygen is given only if hypoxia is present — not automatically.',
    deepExplanation: 'Hydration directly treats the pathophysiology of vaso-occlusive crisis — dehydration promotes sickling. Oxygen is reserved for documented hypoxia. Contact precautions are not indicated for sickle cell disease. Antibiotics address infection, not the crisis itself.',
    others: {
      0: 'Oxygen is administered only if hypoxia is documented — automatic oxygen without indication is not the priority.',
      2: 'Contact precautions are for infectious/contagious conditions — sickle cell crisis is not contagious.',
      3: 'Antibiotics treat infection — not the primary intervention for vaso-occlusive crisis without signs of infection.'
    }
  },
  // 4
  {
    topic: 'Sickle Cell — Triggers',
    type: 'standard',
    stem: 'The nurse is educating the family of a child with sickle cell disease about preventing crises. Which factor is identified as a common trigger for vaso-occlusive episodes?',
    options: [
      'High-fat diet and excessive sleep',
      'Infection, dehydration, and cold temperatures',
      'Mild exercise and warm weather',
      'Caffeine intake and sun exposure'
    ],
    answer: 1,
    concept: 'Sickle Cell — Crisis Triggers',
    rationale: 'Common sickle cell crisis triggers: infection (confirmed test answer), dehydration, hypoxia, cold temperatures, stress, and high altitude. Infection is one of the most dangerous triggers because it promotes inflammatory sickling.',
    deepExplanation: 'Families must know all major triggers to prevent crises. Cold causes vasoconstriction and promotes sickling. Dehydration concentrates the blood. Infection triggers an inflammatory state. Hypoxia is particularly dangerous. Prophylactic penicillin in early childhood and vaccination address the infection risk specifically.',
    others: {
      0: 'High-fat diet and excessive sleep are not sickle cell crisis triggers.',
      2: 'Mild exercise in warm weather is generally safe — these are not typical triggers.',
      3: 'Caffeine and sun exposure are not documented sickle cell crisis triggers.'
    }
  },
  // 5
  {
    topic: 'Hemophilia — Labs',
    type: 'standard',
    stem: 'The nurse is reviewing lab results for a child suspected of having hemophilia. Which laboratory finding is most consistent with this diagnosis?',
    options: [
      'Decreased platelet count with normal aPTT',
      'Prolonged aPTT with normal platelet count and normal PT',
      'Decreased hemoglobin with elevated TIBC',
      'Prolonged PT with normal aPTT'
    ],
    answer: 1,
    concept: 'Hemophilia — Lab Findings',
    rationale: 'Hemophilia is a clotting factor deficiency in the intrinsic pathway → prolonged aPTT. PT and platelet count are both normal because the extrinsic pathway and platelet function are intact.',
    deepExplanation: 'aPTT tests the intrinsic pathway (factors VIII and IX — the ones deficient in hemophilia). PT tests the extrinsic pathway — unaffected in hemophilia. Platelets are normal because hemophilia is a clotting factor problem, not a platelet problem. Decreased Hgb + elevated TIBC = iron deficiency anemia.',
    others: {
      0: 'Decreased platelet count describes thrombocytopenia or ITP — not hemophilia.',
      2: 'Decreased Hgb and elevated TIBC describe iron deficiency anemia — not hemophilia.',
      3: 'Prolonged PT indicates extrinsic pathway problems (warfarin toxicity, liver disease) — hemophilia affects the intrinsic pathway (aPTT).'
    }
  },
  // 6
  {
    topic: 'Hemophilia — S/S',
    type: 'standard',
    stem: 'A child with hemophilia is brought to the clinic after a minor fall. Which finding is most characteristic of hemophilia specifically?',
    options: [
      'Petechiae scattered across the torso',
      'Honey-colored crusting at the wound site',
      'Hemarthrosis with painful swollen joints',
      'Purpura that appeared spontaneously without trauma'
    ],
    answer: 2,
    concept: 'Hemophilia — Hemarthrosis',
    rationale: 'Hemarthrosis (bleeding into joints) is a hallmark clinical finding of hemophilia. The joints become painful, swollen, and warm. It occurs because the clotting factors needed to stop bleeding after minor trauma are absent.',
    deepExplanation: 'Hemophilia causes deep tissue and joint bleeding — hemarthrosis, muscle hematomas, and prolonged bleeding after minor cuts. Petechiae and spontaneous purpura are signs of thrombocytopenia (ITP). Honey-colored crusting is impetigo. The joint bleeding distinguishes hemophilia from platelet disorders.',
    others: {
      0: 'Petechiae indicate low platelets (thrombocytopenia/ITP) — not hemophilia. Hemophilia has normal platelets.',
      1: 'Honey-colored crusting is impetigo — a bacterial skin infection unrelated to hemophilia.',
      3: 'Spontaneous purpura without trauma indicates thrombocytopenia — hemophilia requires trauma or injury to manifest bleeding.'
    }
  },
  // 7
  {
    topic: 'ITP — Recognition',
    type: 'standard',
    stem: 'A 4-year-old is brought to the clinic 10 days after recovering from a viral illness. The parent reports sudden bruising and pinpoint red dots all over the child\'s body. The dots do not turn white when pressed. The nurse recognizes this as which condition?',
    options: [
      'Hemophilia following a viral trigger',
      'Immune Thrombocytopenic Purpura',
      'Leukemia presenting with skin involvement',
      'Impetigo spreading from a localized infection'
    ],
    answer: 1,
    concept: 'ITP — Recognition',
    rationale: 'ITP is an immune-mediated platelet destruction following viral illness. Non-blanching petechiae (pinpoint dots that do not turn white with pressure) and purpura develop from thrombocytopenia. The post-viral onset in a young child is the classic presentation.',
    deepExplanation: 'Non-blanching = blood outside the vessels cannot be pushed away by pressure. Blanching = blood is inside capillaries and pressure empties them temporarily. Post-viral + non-blanching petechiae in a toddler = ITP until proven otherwise. ITP is the immune response that destroys platelets after the body generates antibodies against the viral infection.',
    others: {
      0: 'Hemophilia causes deep tissue and joint bleeding — not petechiae. And hemophilia is a genetic condition, not triggered by viral illness.',
      2: 'Leukemia can cause similar findings but has additional systemic symptoms (fatigue, fever, lymphadenopathy) — ITP is the most likely explanation for isolated post-viral petechiae.',
      3: 'Impetigo causes localized honey-colored crusting — not widespread non-blanching petechiae.'
    }
  },
  // 8
  {
    topic: 'Iron Deficiency Anemia — S/S',
    type: 'sata',
    stem: 'The nurse is assessing a child with suspected iron deficiency anemia. Which findings are consistent with this diagnosis?',
    options: [
      'Fatigue and pallor',
      'Pica — craving and eating ice or dirt',
      'Hemarthrosis and joint swelling',
      'Tachycardia',
      'Brittle spoon-shaped nails',
      'Non-blanching petechiae on the trunk'
    ],
    answerArr: [0, 1, 3, 4],
    concept: 'Iron Deficiency Anemia — S/S',
    rationale: 'Iron deficiency anemia: fatigue and pallor (low Hgb reduces O2 delivery), pica (craving non-food items like ice/dirt), tachycardia (compensatory heart rate increase), and spoon-shaped brittle nails (koilonychia from chronic deficiency). Hemarthrosis = hemophilia. Petechiae = ITP.',
    perOptionExplanations: {
      0: '<strong>Fatigue and pallor</strong> — decreased hemoglobin reduces oxygen delivery to tissues.',
      1: '<strong>Pica</strong> — craving and eating non-food substances (ice = pagophagia, dirt = geophagia) is a classic iron deficiency sign.',
      3: '<strong>Tachycardia</strong> — the heart beats faster to compensate for reduced oxygen-carrying capacity.',
      4: '<strong>Spoon-shaped nails (koilonychia)</strong> — brittle, concave nails from chronic iron deficiency.'
    },
    others: {
      2: 'Hemarthrosis and joint swelling are signs of hemophilia — not iron deficiency anemia.',
      5: 'Non-blanching petechiae indicate thrombocytopenia (ITP) — not iron deficiency anemia.'
    }
  },
  // 9
  {
    topic: 'Iron Deficiency Anemia — Treatment',
    type: 'standard',
    stem: 'A child is prescribed oral iron supplements for iron deficiency anemia. Which instruction maximizes absorption?',
    options: [
      'Give iron with a glass of milk to reduce stomach upset',
      'Give iron with orange juice between meals',

      'Give iron at bedtime with a calcium-rich snack'

    answer: 1,
    concept: 'Iron Supplementation — Absorption',
    rationale: 'Oral iron is best absorbed on an empty stomach or between meals. Vitamin C (ascorbic acid) in orange juice enhances iron absorption by converting ferric to ferrous iron. Milk, calcium, and high-fiber foods all inhibit iron absorption.',
    deepExplanation: 'The three enhancers/inhibitors to know: Vitamin C = enhances absorption. Calcium (milk, dairy) = inhibits. Fiber = inhibits. The empty stomach/between meals timing maximizes bioavailability. Orange juice as the Vitamin C vehicle is the classic teaching pairing.',
    others: {
      0: 'Milk contains calcium which directly competes with and blocks iron absorption.',
      2: 'High-fiber foods bind iron and significantly reduce absorption — iron should not be taken with fiber.',
      3: 'Calcium-rich snacks inhibit iron absorption — bedtime with dairy is one of the worst times to take iron supplements.'
    }
  },
  // 10
  {
    topic: 'Neuroblastoma',
    type: 'standard',
    stem: 'The nurse is admitting a child with a suspected abdominal mass. The diagnosis of neuroblastoma is being considered. Which nursing action is most important during the physical assessment?',

// ── STATE ──────────────────────────────────────
let current = 0, totalPoints = 0, answered = false;
let selectedSATA = new Set(), missedItems = [], topicScores = {};
const TOTAL = questions.length;
const LETTERS = ['A','B','C','D','E','F'];

function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
function updateHeader() {
  document.getElementById('header-score').textContent = `${totalPoints.toFixed(1)} / ${TOTAL}`;
  document.getElementById('progress-bar').style.width = `${(current / TOTAL) * 100}%`;
}
function trackTopic(topic, pts, total) {
  if (!topicScores[topic]) topicScores[topic] = { pts: 0, total: 0 };
  topicScores[topic].pts += pts; topicScores[topic].total += total;
}
function recordMiss(q, qNum, answerText, pts) { missedItems.push({ q, qNum, answerText, pts }); }

function render() {
  answered = false; selectedSATA = new Set();
  const q = questions[current];
  const card = document.getElementById('q-card');
  card.innerHTML = '';
  const meta = el('div', 'q-meta');
  meta.innerHTML = `<span class="q-topic">${q.topic}</span><span class="q-num">${current + 1} / ${TOTAL}</span>`;
  card.appendChild(meta);
  const body = el('div', 'q-body');
  const stem = el('div', 'q-stem'); stem.textContent = q.stem; body.appendChild(stem);
  if (q.type === 'sata') {
    const inst = el('div', 'q-instruction'); inst.textContent = 'Select all that apply.'; body.appendChild(inst);
  }
  card.appendChild(body);
  const opts = el('div', 'options');
  q.options.forEach((txt, i) => {
    const btn = el('button', 'opt'); btn.dataset.idx = i;
    btn.innerHTML = `<span class="opt-indicator">${LETTERS[i]}</span><span>${txt}</span>`;
    btn.onclick = q.type === 'standard' ? () => selectStandard(i) : () => toggleSATA(i, btn);
    opts.appendChild(btn);
  });
  card.appendChild(opts);
  if (q.type === 'sata') {
    const sw = el('div', 'sata-submit-wrap');
    const sb = el('button', 'sata-btn'); sb.id = 'sata-btn'; sb.textContent = 'Submit Answer';
    sb.onclick = submitSATA; sw.appendChild(sb); card.appendChild(sw);
  }
  const rat = el('div', 'rationale-wrap'); rat.id = 'rationale'; card.appendChild(rat);
  const nw = el('div', 'next-wrap'); nw.id = 'next-wrap';
  const nb = el('button', 'next-btn');
  nb.innerHTML = current === TOTAL - 1 ? 'See Final Results <span class="next-arrow">→</span>' : 'Next Question <span class="next-arrow">→</span>';
  nb.onclick = nextQ; nw.appendChild(nb); card.appendChild(nw);
  updateHeader();
  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = 'fadeUp 0.3s ease both'; });
}

function selectStandard(i) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const isCorrect = i === q.answer;
  const pts = isCorrect ? 1 : 0;
  totalPoints += pts;
  if (!isCorrect) recordMiss(q, current + 1, q.options[q.answer], null);
  trackTopic(q.topic, pts, 1);
  document.querySelectorAll('.opt').forEach(btn => {
    btn.classList.add('disabled');
    const idx = parseInt(btn.dataset.idx);
    if (idx === q.answer) btn.classList.add(isCorrect ? 'correct' : 'missed');
    if (idx === i && !isCorrect) btn.classList.add('wrong');
    if (idx !== q.answer && idx !== i) btn.classList.add('dimmed');
  });
  showRationaleStandard(isCorrect, q);
}

function toggleSATA(i, btn) {
  if (answered) return;
  if (selectedSATA.has(i)) { selectedSATA.delete(i); btn.classList.remove('selected'); }
  else { selectedSATA.add(i); btn.classList.add('selected'); }
}

function submitSATA() {
  if (answered || selectedSATA.size === 0) return;
  answered = true;
  const q = questions[current];
  const sel = [...selectedSATA];
  const correct = q.answerArr;
  const correctSel = sel.filter(i => correct.includes(i));
  const wrongSel = sel.filter(i => !correct.includes(i));
  const pts = Math.max(0, (correctSel.length - wrongSel.length) / correct.length);
  totalPoints += pts; trackTopic(q.topic, pts, 1);
  if (pts < 1) recordMiss(q, current + 1, correct.map(i => q.options[i]).join('; '), pts);
  document.querySelectorAll('.opt').forEach(btn => {
    btn.classList.add('disabled');
    const idx = parseInt(btn.dataset.idx);
    btn.classList.remove('selected');
    if (correct.includes(idx) && sel.includes(idx)) btn.classList.add('correct');
    else if (!correct.includes(idx) && sel.includes(idx)) btn.classList.add('wrong');
    else if (correct.includes(idx) && !sel.includes(idx)) btn.classList.add('missed');
    else btn.classList.add('dimmed');
  });
  const sb = document.getElementById('sata-btn');
  if (sb) sb.style.display = 'none';
  showRationaleSATA(pts, q);
}

function showRationaleStandard(isCorrect, q) {
  const rat = document.getElementById('rationale');
  const hClass = isCorrect ? 'correct-h' : 'wrong-h';
  const verdict = isCorrect ? '✓ Correct' : '✗ Incorrect';
  const badgeClass = isCorrect ? 'correct-badge' : 'wrong-badge';
  const badgeText = isCorrect ? 'FULL CREDIT' : 'NO CREDIT';
  let othersHTML = '';
  if (q.others) {
    othersHTML = `<div class="rat-section-title">Why others are wrong</div>`;
    Object.entries(q.others).forEach(([idx, txt]) => {
      const i = parseInt(idx);
      othersHTML += `<div class="rat-option-row"><span class="rat-opt-letter ${i === q.answer ? 'c' : 'w'}">${LETTERS[i]}</span><div class="rat-opt-text">${txt}</div></div>`;
    });
  }
  rat.innerHTML = `
    <div class="rat-header ${hClass}"><span class="rat-verdict">${verdict}</span><span class="rat-badge ${badgeClass}">${badgeText}</span></div>
    <div class="rat-body">
      <span class="rat-concept">${q.concept}</span>
      <div class="rat-answer">Answer: ${LETTERS[q.answer]} — ${q.options[q.answer]}</div>
      <div class="rat-core">${q.rationale}</div>
      <div class="rat-section-title">Why the correct answer is correct</div>
      <div class="rat-core" style="margin-bottom:${othersHTML ? '16px' : '0'}">${q.deepExplanation}</div>
      ${othersHTML}
    </div>`;
  rat.classList.add('show');
  document.getElementById('next-wrap').classList.add('show');
}

function showRationaleSATA(pts, q) {
  const rat = document.getElementById('rationale');
  const isFullCredit = pts === 1, isNoCredit = pts === 0;
  const hClass = isFullCredit ? 'correct-h' : isNoCredit ? 'wrong-h' : 'partial-h';
  const verdict = isFullCredit ? '✓ Correct' : isNoCredit ? '✗ Incorrect' : '◑ Partial Credit';
  const badgeClass = isFullCredit ? 'correct-badge' : isNoCredit ? 'wrong-badge' : 'partial-badge';
  const badgeText = isFullCredit ? 'FULL CREDIT' : isNoCredit ? 'NO CREDIT' : `${Math.round(pts*100)}% CREDIT`;
  let perHTML = '';
  if (q.perOptionExplanations) {
    perHTML = `<div class="rat-section-title">Correct answers explained</div>`;
    Object.entries(q.perOptionExplanations).forEach(([idx, txt]) => {
      perHTML += `<div class="rat-option-row"><span class="rat-opt-letter c">${LETTERS[parseInt(idx)]}</span><div class="rat-opt-text">${txt}</div></div>`;
    });
  }
  let othersHTML = '';
  if (q.others) {
    othersHTML = `<div class="rat-section-title" style="margin-top:14px">Why others are wrong</div>`;
    Object.entries(q.others).forEach(([idx, txt]) => {
      othersHTML += `<div class="rat-option-row"><span class="rat-opt-letter w">${LETTERS[parseInt(idx)]}</span><div class="rat-opt-text">${txt}</div></div>`;
    });
  }
  rat.innerHTML = `
    <div class="rat-header ${hClass}"><span class="rat-verdict">${verdict}</span><span class="rat-badge ${badgeClass}">${badgeText}</span></div>
    <div class="rat-body">
      <span class="rat-concept">${q.concept}</span>
      <div class="rat-answer">Answer: ${q.answerArr.map(i => LETTERS[i]).join(', ')} — ${q.answerArr.map(i => q.options[i]).join('; ')}</div>
      <div class="rat-core">${q.rationale}</div>
      ${perHTML}${othersHTML}
      <div class="sata-legend">
        <div class="legend-item"><div class="legend-dot c"></div>Correct & selected</div>
        <div class="legend-item"><div class="legend-dot m"></div>Correct but missed</div>
        <div class="legend-item"><div class="legend-dot w"></div>Incorrect & selected</div>
      </div>
    </div>`;
  rat.classList.add('show');
  document.getElementById('next-wrap').classList.add('show');
}

function nextQ() {
  current++;
  if (current >= TOTAL) showResults();
  else render();
}

function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('results-screen');
  rs.style.display = 'block';
  const pct = Math.round((totalPoints / TOTAL) * 100);
  const msg = pct >= 90 ? 'Content mastered. Exam-ready.' : pct >= 80 ? 'Strong. Review misses for final polish.' : pct >= 70 ? 'Passing. Focus on weakest areas.' : 'Review these concepts carefully.';
  let breakdownHTML = '';
  Object.entries(topicScores).forEach(([topic, s]) => {
    const p = s.pts / s.total;
    const cls = p >= 0.9 ? 'full' : p >= 0.5 ? 'partial' : 'zero';
    const display = s.total === 1 ? (p === 1 ? '✓' : '✗') : `${s.pts.toFixed(1)}/${s.total}`;
    breakdownHTML += `<div class="breakdown-row"><span class="breakdown-topic">${topic}</span><span class="breakdown-score ${cls}">${display}</span></div>`;
  });
  let missedHTML = '';
  if (missedItems.length > 0) {
    missedHTML = `<div class="missed-section"><div class="missed-title">Missed Concepts (${missedItems.length})</div>`;
    missedItems.forEach(m => {
      const creditLine = m.pts !== null ? ` <span style="color:var(--partial);font-size:11px;">(${Math.round(m.pts*100)}% credit)</span>` : '';
      missedHTML += `
        <div class="missed-item">
          <span class="missed-item-concept">${m.q.concept}</span>
          <div class="missed-item-q"><strong>Q${m.qNum}:</strong> ${m.q.stem.substring(0, 110)}...</div>
          <div class="missed-item-ans">✓ ${m.answerText}${creditLine}</div>
          <div class="missed-item-rat">${m.q.rationale}</div>
        </div>`;
    });
    missedHTML += '</div>';
  }
  rs.innerHTML = `
    <div class="results-card">
      <div class="results-score">${totalPoints.toFixed(1)}/${TOTAL}</div>
      <div class="results-pct">${pct}%</div>
      <div class="results-msg">${msg}</div>
    </div>
    <div class="results-breakdown"><div class="breakdown-title">Topic Breakdown</div>${breakdownHTML}</div>
    ${missedHTML}
    <button class="retry-btn" onclick="restart()">🔄 Retake Quiz</button>`;
}

function restart() {
  current = 0; totalPoints = 0; answered = false;
  selectedSATA = new Set(); missedItems = []; topicScores = {};
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  render();
}

render();
</script>
